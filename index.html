function fmtDate(ts){ if (!ts) return ""; var d = new Date(ts); var dd = ("0" + d.getDate()).slice(-2); var mm = ("0" + (d.getMonth()+1)).slice(-2); return dd + "/" + mm; }
function scGames(r, idx, side){ return (r.setScores && r.setScores[idx]) ? (r.setScores[idx][side]||0) : 0; }
function sumSetsSide(r, side){ var t=0; if (r.setScores){ for (var i=0;i<r.setScores.length;i++){ t += (r.setScores[i][side]||0); } } return t; }
function scoreLabel(r){
  if (rankFilter.mode === "extremo"){ var s = (r.setScores && r.setScores[0]) ? r.setScores[0] : null; return s ? (s[0] + "-" + s[1]) : "-"; }
  if (r.setScores && r.setScores.length){ var parts = []; for (var i=0;i<r.setScores.length;i++){ parts.push(r.setScores[i][0] + "-" + r.setScores[i][1]); } return parts.join(" "); }
  return numOk(r.setsMe) + "-" + numOk(r.setsRival);
}
function partidoBucket(r){
  var sets = (r.setScores && r.setScores.length) ? r.setScores.length : (numOk(r.setsMe)+numOk(r.setsRival));
  if (r.won) return (sets >= 3) ? 1 : 0;   // victoria 2 sets=0, victoria 3 sets=1
  return (sets >= 3) ? 2 : 3;              // derrota 3 sets=2, derrota 2 sets=3
}
function cmpSetResult(a, b){
  var aw = a.won?1:0, bw = b.won?1:0;
  if (aw !== bw) return bw - aw;                                             // victorias primero
  if (aw){ if (scGames(a,0,1) !== scGames(b,0,1)) return scGames(a,0,1) - scGames(b,0,1); }   // menos concedidos = mejor
  else { if (scGames(a,0,0) !== scGames(b,0,0)) return scGames(b,0,0) - scGames(a,0,0); }     // mas hechos = mejor
  return (a.avgRT||0) - (b.avgRT||0);                                        // empate: reaccion
}
function cmpPartidoResult(a, b){
  var ba = partidoBucket(a), bb = partidoBucket(b);
  if (ba !== bb) return ba - bb;
  if (a.won){ var arv = sumSetsSide(a,1), brv = sumSetsSide(b,1); if (arv !== brv) return arv - brv; }   // menos concedidos
  else { var ame = sumSetsSide(a,0), bme = sumSetsSide(b,0); if (ame !== bme) return bme - ame; }        // mas hechos
  return (a.avgRT||0) - (b.avgRT||0);
}
function readPct(r){ var tot = numOk(r.readTotal); if (tot <= 0) return -1; return (numOk(r.readOk) / tot) * 100; }
function cmpAnalisis(a, b){ var pa = readPct(a), pb = readPct(b); if (pa !== pb) return pb - pa; return (a.avgRT||0) - (b.avgRT||0); }
function rankSorter(){
  if (isFreeMode(rankFilter.mode)) return cmpFree;
  if (rankFilter.mode === "normal") return function(a,b){ return (a.avgRT||0)-(b.avgRT||0); };
  if (rankFilter.order === "resultado"){ return (rankFilter.mode === "extremo") ? cmpSetResult : cmpPartidoResult; }
  return cmpAnalisis;   // analisis
}
function renderRanking(){
  var host = $("rk-table");
  var list;
  if (allScores){
    list = allScores.filter(function(r){
      if (r.mode !== rankFilter.mode) return false;
      if (isFreeMode(rankFilter.mode)) return true;    // Infinito/Peloteo: sin filtros inferiores
      if (rankFilter.mode === "normal") return true;   // JUEGO: sin longitud de set
      if (r.count !== rankFilter.count) return false;
      return (r.matchMode || "azar") === rankFilter.matchMode;   // excluye azar
    });
  } else {
    var free = isFreeMode(rankFilter.mode);
    list = safeGet(lbKey(rankFilter.mode, free ? 0 : rankFilter.count, free ? true : rankFilter.penaliza));
    if (!free && rankFilter.mode !== "normal"){ list = list.filter(function(r){ return (r.matchMode || "azar") === rankFilter.matchMode; }); }
  }
  list.sort(rankSorter());
  renderRankList(list, host, rankFilter.mode);
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" })[c];
  });
}

// ---------- Selectores (delegacion) ----------
function bindSelector(rowId, attr, onPick){
  var row = $(rowId);
  row.addEventListener("click", function(e){
    var el = e.target.closest(".opt");
    if (!el) return;
    var opts = row.querySelectorAll(".opt");
    for (var i=0;i<opts.length;i++) opts[i].classList.remove("sel");
    el.classList.add("sel");
    onPick(el.getAttribute(attr));
  });
}

function refreshModeDesc(){
  var el = $("mode-desc");
  if (el) el.innerHTML = MODES[state.mode].desc;
}
function applyJuegoCountUI(isJuego){ /* SET4/SET6 vive ahora en el panel de modo */ }

// ---------- Init ----------
function openRanking(){
  var m = state.mode;
  rankFilter.mode = (m === "normal") ? "extremo" : m;   // JUEGO ya no tiene pestana: cae en SET
  rankFilter.count = state.count ? state.count : 6;
  rankFilter.penaliza = state.penaliza;
  var mm = state.matchMode;
  rankFilter.matchMode = (mm === "azar" || mm === "tactica" || mm === "estrategia" || mm === "total") ? mm : "tactica";
  if (!rankFilter.order) rankFilter.order = "resultado";
  syncRankFilters();
  applyRankRows();
  hideRepeated = true;
  var dd = $("btn-hide-repeated");
  if (dd){ dd.textContent = "Mostrar repetidos"; }
  show("screen-ranking");
  loadRanking();
}

function loadRanking(){
  var host = $("rk-table");
  if (window.RDS_DB && window.RDS_DB.ok){
    host.innerHTML = '<div class="rk-empty">Cargando ranking global...</div>';
    window.RDS_DB.fetchAll().then(function(list){
      allScores = list;
      renderRanking();
    }).catch(function(){
      allScores = null;
      host.innerHTML = '<div class="rk-empty">No se pudo cargar el ranking global. Revisa la conexion.</div>';
    });
  } else {
    allScores = null;
    renderRanking();
  }
}

function goHome(){ stopLoop(); if (typeof stop1v1 === "function") stop1v1(); if (typeof stopInfinito === "function") stopInfinito(); if (typeof stopPeloteo === "function") stopPeloteo(); show("screen-home"); }
function repeatTest(){ stopLoop(); if (lastPlayed){ state.mode = lastPlayed.mode; state.count = lastPlayed.count; } startGame(); }
var TACTIC_OPTS = [["esquinas","Esquina a esquina"],["insistencia","Insistencia (mismo lado)"],["prof_corta","Profundo cruzado + corta"],["corto_largo","Cruzado corto + paralelo largo"],["media_volea","Media pista + volea"],["prof_dejada","Profunda y dejada"],["dejada_subir","Dejada y subir"]];
var STYLE_OPTS = [["pasabolas","Pasabolas / Defensivo"],["atacante","Atacante / Golpeador"],["contragolpeador","Contragolpeador"],["todo_pista","Toda la pista"]];
function hasOpt(opts, v){ for (var i=0;i<opts.length;i++){ if (opts[i][0] === v) return true; } return false; }
function refreshRivalSub(){
  var sub = $("rival-sub"); if (!sub) return;
  var sub2 = $("rival-sub2");
  var m = state.playMode;
  var opts = (m === "tactica") ? TACTIC_OPTS : ((m === "estrategia" || m === "tacest") ? STYLE_OPTS : null);
  if (opts){
    if (m === "tactica"){ if (!hasOpt(opts, state.playTactic)) state.playTactic = opts[0][0]; }
    else { if (!hasOpt(opts, state.playStyle)) state.playStyle = opts[0][0]; }
    var cur = (m === "tactica") ? state.playTactic : state.playStyle, html = "";
    for (var i=0;i<opts.length;i++){ html += '<option value="' + opts[i][0] + '"' + (opts[i][0] === cur ? ' selected' : '') + '>' + opts[i][1] + '</option>'; }
    sub.innerHTML = html; sub.value = cur; sub.disabled = false;
  } else { sub.innerHTML = ""; sub.disabled = true; }
  if (sub2){
    if (m === "tacest"){
      var menu = STYLE_TACTICS[state.playStyle] || ALL_TACTICS;
      if (menu.indexOf(state.playTactic) < 0) state.playTactic = menu[0];
      var h2 = "";
      for (var j=0;j<menu.length;j++){ h2 += '<option value="' + menu[j] + '"' + (menu[j] === state.playTactic ? ' selected' : '') + '>' + readLabel(TACTIC_OPTS, menu[j]) + '</option>'; }
      sub2.innerHTML = h2; sub2.value = state.playTactic; sub2.disabled = false;
    } else { sub2.innerHTML = ""; sub2.disabled = true; }
  }
}
function applyRivalVisibility(){ var sec = $("rival-section"); if (sec) sec.style.display = (state.mode === "normal") ? "" : "none"; }
function syncMMCount(){
  var btns = document.querySelectorAll("#mm-count .mm-cbtn");
  for (var i=0;i<btns.length;i++){
    btns[i].classList.toggle("sel", parseInt(btns[i].getAttribute("data-count"),10) === state.count);
  }
}
function showMatchModePanel(){
  state.paused = true;
  syncMMCount();
  var ov = $("mm-overlay"); if (ov) ov.style.display = "flex";
}
function pickMatchMode(v){
  state.matchMode = v;
  var ov = $("mm-overlay"); if (ov) ov.style.display = "none";
  state.paused = false;
  initRival();                 // plan del rival segun el modo elegido
  startCountdown();
}
function showRivalSetup(){
  state.paused = true;
  state.rivalSetup = true;
  var t = $("pause-title"); if (t) t.textContent = "ELIGE RIVAL";
  var c = $("pause-continue"); if (c) c.textContent = "Empezar";
  refreshRivalSub();
  applyRivalVisibility();
  var ov = $("pause-overlay"); if (ov) ov.style.display = "flex";
}
function pauseGame(){
  if (!state.tbMode || state.paused) return;
  state.paused = true;
  state.rivalSetup = false;
  state.active = false;
  state.running = false;
  clearTimeout(state.gapTimer);
  state.tbToken = (state.tbToken || 0) + 1;
  if (state.rafId) cancelAnimationFrame(state.rafId);
  state.tb = null;
  hideCenter();
  var t = $("pause-title"); if (t) t.textContent = "PAUSA";
  var c = $("pause-continue"); if (c) c.textContent = "Seguir";
  refreshRivalSub();
  applyRivalVisibility();
  var ov = $("pause-overlay"); if (ov) ov.style.display = "flex";
}
function resumeGame(){
  var ov = $("pause-overlay"); if (ov) ov.style.display = "none";
  if (state.rivalSetup){ state.rivalSetup = false; state.paused = false; startCountdown(); return; }
  if (!state.paused) return;
  state.paused = false;
  state.active = true;
  if (!state.running){ state.running = true; state.lastTs = performance.now(); state.rafId = requestAnimationFrame(loop); }
  startPoint();   // reanuda con un punto nuevo, conservando el marcador
}
function restartGame(){
  var ov = $("pause-overlay"); if (ov) ov.style.display = "none";
  var eo = $("end-overlay"); if (eo) eo.style.display = "none";
  state.paused = false;
  repeatTest();   // reinicia el partido desde 0-0
}

function init(){
  setupCanvas();

  // Audio: desbloquear en el primer gesto y sonar al pulsar cualquier boton/opcion
  document.addEventListener("touchend", function(){
    initAudio();
    if (audioCtx && audioCtx.state === "suspended"){ try { audioCtx.resume(); } catch(e){} }
  }, { passive: true });
  document.addEventListener("click", function(e){
    var el = e.target.closest("button, .opt, .exit, #hud-home");
    if (el) soundClick();
  });

  applyJuegoCountUI(state.mode === "normal");
  function selectMode(v){
    state.mode = v;
    var rows = [$("mode-row"), $("mode2-row")];
    for (var r=0;r<rows.length;r++){
      if (!rows[r]) continue;
      var os = rows[r].querySelectorAll(".opt");
      for (var i2=0;i2<os.length;i2++){ os[i2].classList.toggle("sel", os[i2].getAttribute("data-mode") === v); }
    }
    applyJuegoCountUI(v === "normal");
  }
  var mrows = [$("mode-row"), $("mode2-row")];
  for (var mr=0; mr<mrows.length; mr++){
    if (!mrows[mr]) continue;
    var mo = mrows[mr].querySelectorAll(".opt");
    for (var mi=0; mi<mo.length; mi++){
      mo[mi].addEventListener("click", (function(v){ return function(){ selectMode(v); }; })(mo[mi].getAttribute("data-mode")));
    }
  }

  var cBtns = document.querySelectorAll("#mm-count .mm-cbtn");
  for (var cb=0; cb<cBtns.length; cb++){
    cBtns[cb].addEventListener("click", (function(v){ return function(){ state.count = v; syncMMCount(); }; })(parseInt(cBtns[cb].getAttribute("data-count"),10)));
  }
  var mmBtns = document.querySelectorAll("#mm-overlay .mm-btn");
  for (var mb=0; mb<mmBtns.length; mb++){
    mmBtns[mb].addEventListener("click", (function(v){ return function(){ pickMatchMode(v); }; })(mmBtns[mb].getAttribute("data-mm")));
  }
  var rmode = $("rival-mode");
  if (rmode){ rmode.value = state.playMode; rmode.addEventListener("change", function(){ state.playMode = rmode.value; refreshRivalSub(); if (state.mode === "normal") setGamePlan(); }); }
  var rsub = $("rival-sub");
  if (rsub){ rsub.addEventListener("change", function(){ if (state.playMode === "tactica") state.playTactic = rsub.value; else state.playStyle = rsub.value; if (state.playMode === "tacest") refreshRivalSub(); if (state.mode === "normal") setGamePlan(); }); }
  var rsub2 = $("rival-sub2");
  if (rsub2){ rsub2.addEventListener("change", function(){ state.playTactic = rsub2.value; if (state.mode === "normal") setGamePlan(); }); }
  refreshRivalSub();

  bindSelector("rk-mode", "data-mode", function(v){ rankFilter.mode = v; applyRankRows(); renderRanking(); });
  bindSelector("rk-count", "data-count", function(v){ rankFilter.count = parseInt(v,10); renderRanking(); });
  bindSelector("rk-matchmode", "data-matchmode", function(v){ rankFilter.matchMode = v; syncRankOrderBtn(); renderRanking(); });

  $("btn-start").addEventListener("click", startGame);
  var b1v1 = $("btn-1v1"); if (b1v1) b1v1.addEventListener("click", start1v1);
  var dBtns = document.querySelectorAll("#setup-1v1 .d1v1-btn");
  for (var db=0; db<dBtns.length; db++){
    dBtns[db].addEventListener("click", (function(v){ return function(){ pickD1v1(v); }; })(dBtns[db].getAttribute("data-d1v1")));
  }
  var dcb = document.querySelectorAll("#d1v1-count .mm-cbtn");
  for (var dc=0; dc<dcb.length; dc++){
    dcb[dc].addEventListener("click", (function(v){ return function(){ d1v1.count = v; syncD1v1(); }; })(parseInt(dcb[dc].getAttribute("data-c1v1"),10)));
  }
  $("btn-goranking").addEventListener("click", openRanking);

  // nombre para el ranking: iniciales + deporte -> INI-DEP
  var sIni = safeGet("rtenis_initials");
  var sDep = safeGet("rtenis_sport");
  var savedIni = (typeof sIni === "string") ? sIni : "";
  var savedDep = (typeof sDep === "string" && sDep) ? sDep : "OTR";
  if (savedIni) $("home-initials").value = savedIni;
  $("home-sport").value = savedDep;
  savedName = buildPlayerName(savedIni, savedDep);
  function persistPlayerName(){
    var ini = ($("home-initials").value || "").trim().toUpperCase().replace(/[^A-Z]/g, "").slice(0,3);
    var dep = $("home-sport").value || "OTR";
    savedName = buildPlayerName(ini, dep);
    safeSet("rtenis_initials", ini);
    safeSet("rtenis_sport", dep);
    safeSet("rtenis_name", savedName);
  }
  $("home-initials").addEventListener("input", persistPlayerName);
  $("home-sport").addEventListener("change", persistPlayerName);


  // canvas input
  var c = $("play");
  c.addEventListener("touchstart", onTouch, { passive:false });
  c.addEventListener("mousedown", onMouse);
  var c2 = $("play1v1");
  if (c2){
    c2.addEventListener("touchstart", function(e){ e.preventDefault(); if (e.touches && e.touches.length) tapCourt2(e.touches[0].clientX, e.touches[0].clientY); }, { passive:false });
    c2.addEventListener("mousedown", function(e){ tapCourt2(e.clientX, e.clientY); });
  }
  var __gs = document.getElementById("screen-game");
  if (__gs){
    __gs.addEventListener("gesturestart", function(e){ e.preventDefault(); }, { passive:false });
    __gs.addEventListener("gesturechange", function(e){ e.preventDefault(); }, { passive:false });
    __gs.addEventListener("gestureend", function(e){ e.preventDefault(); }, { passive:false });
    __gs.addEventListener("touchmove", function(e){ e.preventDefault(); }, { passive:false });
  }

  refreshModeDesc();
}

function applyRankRows(){
  var free = isFreeMode(rankFilter.mode);
  var c = $("rk-count"); if (c) c.classList.toggle("dim", free);
  var rm = $("rk-matchmode"); if (rm) rm.classList.toggle("dim", free);
  syncRankOrderBtn();
}
function rankOrderOff(){ return isFreeMode(rankFilter.mode) || rankFilter.matchMode === "azar"; }   // sin preguntas "?": no hay analisis
function syncRankOrderBtn(){
  var b = $("btn-rank-order");
  if (!b) return;
  var off = rankOrderOff();
  if (off) rankFilter.order = "resultado";
  b.disabled = off;
  b.textContent = (rankFilter.order === "analisis") ? "RESULTADOS" : "AN\u00c1LISIS";
}
function toggleRankOrder(){
  if (rankOrderOff()) return;
  rankFilter.order = (rankFilter.order === "analisis") ? "resultado" : "analisis";
  syncRankOrderBtn();
  renderRanking();
}
function syncRankFilters(){
  var mr = $("rk-mode").querySelectorAll(".opt");
  for (var i=0;i<mr.length;i++) mr[i].classList.toggle("sel", mr[i].getAttribute("data-mode")===rankFilter.mode);
  var cr = $("rk-count").querySelectorAll(".opt");
  for (var j=0;j<cr.length;j++) cr[j].classList.toggle("sel", parseInt(cr[j].getAttribute("data-count"),10)===rankFilter.count);
  var mm = $("rk-matchmode"); if (mm){ var mo = mm.querySelectorAll(".opt"); for (var k=0;k<mo.length;k++) mo[k].classList.toggle("sel", mo[k].getAttribute("data-matchmode")===rankFilter.matchMode); }
}

document.addEventListener("DOMContentLoaded", init);

// Service Worker para uso sin conexion
if ("serviceWorker" in navigator) {
  var swRefreshing = false;
  var hadController = !!navigator.serviceWorker.controller;
  navigator.serviceWorker.addEventListener("controllerchange", function(){
    if (!hadController) return;
    if (swRefreshing) return;
    swRefreshing = true;
    window.location.reload();
  });
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("sw.js", { updateViaCache: "none" }).then(function(reg){
      reg.update();
      document.addEventListener("visibilitychange", function(){
        if (document.visibilityState === "visible") reg.update();
      });
      if (reg.waiting && navigator.serviceWorker.controller) {
        reg.waiting.postMessage({action:"skipWaiting"});
      }
      reg.addEventListener("updatefound", function(){
        var nw = reg.installing;
        if (!nw) return;
        nw.addEventListener("statechange", function(){
          if (nw.state === "installed" && navigator.serviceWorker.controller) {
            nw.postMessage({action:"skipWaiting"});
          }
        });
      });
    }).catch(function(){});
  });
}
</script>
